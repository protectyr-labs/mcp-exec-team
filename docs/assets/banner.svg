<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 260" role="img" aria-label="mcp-exec-team: senior domain specialists on demand for small teams">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.8" fill="#475569" fill-opacity="0.2"/>
    </pattern>
    <radialGradient id="userGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="panelGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="260" fill="url(#bg)"/>
  <rect width="1200" height="260" fill="url(#grid)"/>

  <!-- Left: title block -->
  <g transform="translate(60, 54)">
    <!-- Pill -->
    <g transform="translate(0, -10)">
      <rect x="0" y="0" width="240" height="22" rx="11" fill="#0b1220" stroke="#334155" stroke-width="1"/>
      <text x="12" y="15" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="10" fill="#64748b">MCP SERVER</text>
      <line x1="88" y1="5" x2="88" y2="17" stroke="#334155" stroke-width="1"/>
      <text x="98" y="15" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="10" fill="#64748b">TYPESCRIPT 5.4</text>
      <line x1="188" y1="5" x2="188" y2="17" stroke="#334155" stroke-width="1"/>
      <text x="198" y="15" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="10" fill="#64748b">MIT</text>
    </g>

    <!-- Title -->
    <text x="0" y="36" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="38" font-weight="700" fill="#e2e8f0" letter-spacing="-1">mcp-exec-team</text>

    <!-- Subtitle -->
    <text x="0" y="66" font-family="ui-sans-serif,-apple-system,Segoe UI,sans-serif" font-size="16" fill="#cbd5e1" font-weight="500">A standing panel of senior domain specialists.</text>
    <text x="0" y="88" font-family="ui-sans-serif,-apple-system,Segoe UI,sans-serif" font-size="15" fill="#94a3b8" font-weight="400">On demand, for the teams that cannot hire them full-time.</text>
    <text x="0" y="108" font-family="ui-sans-serif,-apple-system,Segoe UI,sans-serif" font-size="14" fill="#64748b" font-weight="400" font-style="italic">They collaborate. They disagree. They stand their ground.</text>

    <!-- Topic examples -->
    <g transform="translate(0, 140)">
      <text x="0" y="0" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="11" fill="#475569">on any topic:</text>
      <text x="82" y="0" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="11" fill="#60a5fa">operations</text>
      <text x="162" y="0" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="11" fill="#475569">·</text>
      <text x="172" y="0" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="11" fill="#34d399">finance</text>
      <text x="228" y="0" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="11" fill="#475569">·</text>
      <text x="238" y="0" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="11" fill="#fb923c">security</text>
      <text x="302" y="0" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="11" fill="#475569">·</text>
      <text x="312" y="0" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="11" fill="#a78bfa">product</text>
      <text x="368" y="0" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="11" fill="#475569">·</text>
      <text x="378" y="0" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="11" fill="#f472b6">legal</text>
      <text x="418" y="0" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="11" fill="#475569">·</text>
      <text x="428" y="0" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="11" fill="#22d3ee">growth</text>
      <text x="482" y="0" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="11" fill="#475569">· +</text>
    </g>

    <!-- Bottom label -->
    <text x="0" y="175" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="10" fill="#334155">protectyr-labs/mcp-exec-team</text>
  </g>

  <!-- Right: small team reaching up to panel of specialists -->
  <g transform="translate(660, 30)">
    <!-- User/founder on the left side -->
    <circle cx="60" cy="110" r="45" fill="url(#userGlow)"/>
    <g transform="translate(40, 88)">
      <rect x="0" y="0" width="42" height="44" rx="6" fill="#0f172a" stroke="#60a5fa" stroke-width="1.5"/>
      <!-- tiny person silhouette -->
      <circle cx="21" cy="14" r="5" fill="#60a5fa"/>
      <path d="M 9 34 Q 9 24 21 24 Q 33 24 33 34 Z" fill="#60a5fa"/>
      <text x="21" y="58" text-anchor="middle" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="9" fill="#60a5fa">YOU</text>
    </g>
    <text x="60" y="172" text-anchor="middle" font-family="ui-sans-serif,Segoe UI,sans-serif" font-size="10" fill="#64748b" font-style="italic">"should we raise prices?"</text>

    <!-- Topic/question beam toward panel -->
    <g stroke="#475569" stroke-width="1" fill="none" stroke-dasharray="2,3">
      <line x1="105" y1="110" x2="160" y2="110"/>
    </g>

    <!-- Panel of specialists — constellation with overlap -->
    <!-- OPS specialist (top-left) -->
    <g transform="translate(170, 20)">
      <circle cx="50" cy="100" r="55" fill="url(#panelGlow)"/>
      <rect x="0" y="0" width="100" height="36" rx="6" fill="#0f172a" stroke="#60a5fa" stroke-width="1.5"/>
      <circle cx="14" cy="18" r="4" fill="#60a5fa"/>
      <text x="26" y="16" font-family="ui-sans-serif,Segoe UI,sans-serif" font-size="10" fill="#93c5fd" font-weight="600">OPS</text>
      <text x="26" y="28" font-family="ui-sans-serif,Segoe UI,sans-serif" font-size="8" fill="#60a5fa">20yr scale-up</text>
      <!-- conviction stroke -->
      <path d="M 100 18 L 115 12" stroke="#60a5fa" stroke-width="1.5" opacity="0.7"/>
    </g>

    <!-- FINANCE specialist (top-right) -->
    <g transform="translate(330, 30)">
      <rect x="0" y="0" width="100" height="36" rx="6" fill="#0f172a" stroke="#34d399" stroke-width="1.5"/>
      <circle cx="14" cy="18" r="4" fill="#34d399"/>
      <text x="26" y="16" font-family="ui-sans-serif,Segoe UI,sans-serif" font-size="10" fill="#6ee7b7" font-weight="600">FINANCE</text>
      <text x="26" y="28" font-family="ui-sans-serif,Segoe UI,sans-serif" font-size="8" fill="#34d399">CFO, ex-PE</text>
      <path d="M 0 18 L -15 12" stroke="#34d399" stroke-width="1.5" opacity="0.7"/>
    </g>

    <!-- SECURITY specialist (middle) -->
    <g transform="translate(240, 80)">
      <rect x="0" y="0" width="100" height="36" rx="6" fill="#0f172a" stroke="#fb923c" stroke-width="1.5"/>
      <circle cx="14" cy="18" r="4" fill="#fb923c"/>
      <text x="26" y="16" font-family="ui-sans-serif,Segoe UI,sans-serif" font-size="10" fill="#fdba74" font-weight="600">SECURITY</text>
      <text x="26" y="28" font-family="ui-sans-serif,Segoe UI,sans-serif" font-size="8" fill="#fb923c">CISSP, breach-tested</text>
    </g>

    <!-- PRODUCT specialist (bottom-left) -->
    <g transform="translate(170, 130)">
      <rect x="0" y="0" width="100" height="36" rx="6" fill="#0f172a" stroke="#a78bfa" stroke-width="1.5"/>
      <circle cx="14" cy="18" r="4" fill="#a78bfa"/>
      <text x="26" y="16" font-family="ui-sans-serif,Segoe UI,sans-serif" font-size="10" fill="#c4b5fd" font-weight="600">PRODUCT</text>
      <text x="26" y="28" font-family="ui-sans-serif,Segoe UI,sans-serif" font-size="8" fill="#a78bfa">shipped 0→1 x5</text>
      <path d="M 0 18 L -12 24" stroke="#a78bfa" stroke-width="1.5" opacity="0.7"/>
    </g>

    <!-- LEGAL specialist (bottom-right) -->
    <g transform="translate(330, 130)">
      <rect x="0" y="0" width="100" height="36" rx="6" fill="#0f172a" stroke="#f472b6" stroke-width="1.5"/>
      <circle cx="14" cy="18" r="4" fill="#f472b6"/>
      <text x="26" y="16" font-family="ui-sans-serif,Segoe UI,sans-serif" font-size="10" fill="#f9a8d4" font-weight="600">LEGAL</text>
      <text x="26" y="28" font-family="ui-sans-serif,Segoe UI,sans-serif" font-size="8" fill="#f472b6">contracts, IP</text>
      <path d="M 100 18 L 115 24" stroke="#f472b6" stroke-width="1.5" opacity="0.7"/>
    </g>

    <!-- Disagreement arrows between specialists (real collaboration) -->
    <g fill="none" stroke-width="1" opacity="0.55">
      <!-- OPS <-> FINANCE (they'll argue about cost vs capacity) -->
      <path d="M 280 42 Q 310 32 335 48" stroke="#34d399" stroke-dasharray="2,2"/>
      <polygon points="333,45 339,49 332,52" fill="#34d399"/>

      <!-- SECURITY <-> PRODUCT (ship speed vs safety) -->
      <path d="M 280 118 Q 262 134 250 146" stroke="#a78bfa" stroke-dasharray="2,2"/>
      <polygon points="253,143 249,148 256,147" fill="#a78bfa"/>

      <!-- FINANCE <-> LEGAL (pricing vs compliance) -->
      <path d="M 420 66 Q 428 98 420 130" stroke="#f472b6" stroke-dasharray="2,2"/>
      <polygon points="417,127 421,133 424,126" fill="#f472b6"/>

      <!-- SECURITY is central — points to everyone -->
      <line x1="290" y1="100" x2="250" y2="42" stroke="#fb923c"/>
      <line x1="330" y1="100" x2="375" y2="42" stroke="#fb923c"/>
    </g>

    <!-- Label under constellation -->
    <text x="290" y="195" text-anchor="middle" font-family="ui-sans-serif,Segoe UI,sans-serif" font-size="11" fill="#64748b" font-style="italic">they collaborate. they push back. they help you decide.</text>
  </g>
</svg>
