<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 220" role="img" aria-label="mcp-exec-team: multi-persona debate engine as MCP server">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.8" fill="#475569" fill-opacity="0.2"/>
    </pattern>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="220" fill="url(#bg)"/>
  <rect width="1200" height="220" fill="url(#grid)"/>
  <circle cx="900" cy="110" r="180" fill="url(#centerGlow)"/>

  <!-- Left: title block -->
  <g transform="translate(60, 60)">
    <!-- Status pill -->
    <g transform="translate(0, -10)">
      <rect x="0" y="0" width="240" height="22" rx="11" fill="#0b1220" stroke="#334155" stroke-width="1"/>
      <text x="12" y="15" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="10" fill="#64748b">MCP SERVER</text>
      <line x1="88" y1="5" x2="88" y2="17" stroke="#334155" stroke-width="1"/>
      <text x="98" y="15" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="10" fill="#64748b">TYPESCRIPT 5.4</text>
      <line x1="188" y1="5" x2="188" y2="17" stroke="#334155" stroke-width="1"/>
      <text x="198" y="15" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="10" fill="#64748b">MIT</text>
    </g>

    <!-- Title -->
    <text x="0" y="36" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="38" font-weight="700" fill="#e2e8f0" letter-spacing="-1">mcp-exec-team</text>

    <!-- Subtitle -->
    <text x="0" y="62" font-family="ui-sans-serif,-apple-system,Segoe UI,sans-serif" font-size="15" fill="#94a3b8" font-weight="400">Multi-persona debate engine as an MCP server.</text>
    <text x="0" y="82" font-family="ui-sans-serif,-apple-system,Segoe UI,sans-serif" font-size="15" fill="#64748b" font-weight="400">Sequential turns. Sparse reactions. Silence as a first-class option.</text>

    <!-- Bottom label -->
    <text x="0" y="120" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="11" fill="#475569">protectyr-labs/mcp-exec-team</text>
  </g>

  <!-- Right: 4-persona roundtable visualization -->
  <g transform="translate(720, 45)">
    <!-- Center question node -->
    <g transform="translate(175, 60)">
      <circle r="22" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
      <text x="0" y="5" text-anchor="middle" font-family="ui-sans-serif,Segoe UI,sans-serif" font-size="16" fill="#cbd5e1" font-weight="600">?</text>
    </g>

    <!-- Persona 1: Product Manager (top-left) -->
    <g transform="translate(40, 10)">
      <rect x="0" y="0" width="110" height="34" rx="5" fill="#0f172a" stroke="#60a5fa" stroke-width="1.5"/>
      <circle cx="14" cy="17" r="4" fill="#60a5fa"/>
      <text x="26" y="15" font-family="ui-sans-serif,Segoe UI,sans-serif" font-size="10" fill="#93c5fd" font-weight="600">PRODUCT</text>
      <text x="26" y="26" font-family="ui-sans-serif,Segoe UI,sans-serif" font-size="9" fill="#60a5fa">turn 1</text>
    </g>

    <!-- Persona 2: Staff Engineer (top-right) -->
    <g transform="translate(200, 10)">
      <rect x="0" y="0" width="110" height="34" rx="5" fill="#0f172a" stroke="#34d399" stroke-width="1.5"/>
      <circle cx="14" cy="17" r="4" fill="#34d399"/>
      <text x="26" y="15" font-family="ui-sans-serif,Segoe UI,sans-serif" font-size="10" fill="#6ee7b7" font-weight="600">ENGINEER</text>
      <text x="26" y="26" font-family="ui-sans-serif,Segoe UI,sans-serif" font-size="9" fill="#34d399">turn 2</text>
    </g>

    <!-- Persona 3: Security (bottom-left) -->
    <g transform="translate(40, 80)">
      <rect x="0" y="0" width="110" height="34" rx="5" fill="#0f172a" stroke="#fb923c" stroke-width="1.5"/>
      <circle cx="14" cy="17" r="4" fill="#fb923c"/>
      <text x="26" y="15" font-family="ui-sans-serif,Segoe UI,sans-serif" font-size="10" fill="#fdba74" font-weight="600">SECURITY</text>
      <text x="26" y="26" font-family="ui-sans-serif,Segoe UI,sans-serif" font-size="9" fill="#fb923c">turn 3</text>
    </g>

    <!-- Persona 4: [PASS] (bottom-right) -->
    <g transform="translate(200, 80)">
      <rect x="0" y="0" width="110" height="34" rx="5" fill="#0f172a" stroke="#475569" stroke-width="1.5" stroke-dasharray="3,3"/>
      <circle cx="14" cy="17" r="4" fill="#64748b"/>
      <text x="26" y="15" font-family="ui-sans-serif,Segoe UI,sans-serif" font-size="10" fill="#94a3b8" font-weight="600">DESIGN</text>
      <text x="26" y="26" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="9" fill="#64748b">[PASS]</text>
    </g>

    <!-- Sequential arrows 1 -> 2 -> 3 -->
    <g fill="none" stroke-width="1.5">
      <!-- 1 to 2 -->
      <path d="M 150 27 L 200 27" stroke="#60a5fa"/>
      <polygon points="198,24 204,27 198,30" fill="#60a5fa"/>

      <!-- 2 down to center -->
      <path d="M 255 44 L 210 60" stroke="#34d399"/>
      <polygon points="214,56 207,62 211,58" fill="#34d399"/>

      <!-- center down to 3 -->
      <path d="M 160 80 L 150 97" stroke="#fb923c"/>
      <polygon points="149,93 144,99 152,99" fill="#fb923c"/>
    </g>

    <!-- Label -->
    <text x="175" y="135" text-anchor="middle" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="10" fill="#475569">sequential roundtable + [PASS] rule</text>
  </g>
</svg>
